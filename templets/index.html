<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI House Price Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>


<body>
    <nav class="navbar">

    <div class="nav-logo">
        🏠 AI House Price Prediction
    </div>

   <div class="nav-links">

    <a href="/">
        Home
    </a>

    <a href="/about">
        About
    </a>

    <a href="/contact">
        Contact
    </a>

    <a href="/dashboard">
        Dashboard
    </a>

</div>
</nav>


    <div class="container">


        <div class="header">

            <h1>
                🏠 AI House Price Prediction
            </h1>

            <p>
                Predict house prices using Machine Learning
            </p>

        </div>


        <div class="card">


            <form
                action="/predict"
                method="POST"
            >


                <div class="form-group">

                    <label>
                        Living Area (sq ft)
                    </label>

                    <input
                        type="number"
                        name="GrLivArea"
                        placeholder="Example: 2000"
                        min="1"
                        required
                    >

                </div>


                <div class="form-group">

                    <label>
                        Number of Bedrooms
                    </label>

                    <input
                        type="number"
                        name="BedroomAbvGr"
                        placeholder="Example: 3"
                        min="1"
                        required
                    >

                </div>


                <div class="form-group">

                    <label>
                        Number of Bathrooms
                    </label>

                    <input
                        type="number"
                        name="FullBath"
                        placeholder="Example: 2"
                        min="1"
                        required
                    >

                </div>


                <div class="form-group">

                    <label>
                        Year Built
                    </label>

                    <input
                        type="number"
                        name="YearBuilt"
                        placeholder="Example: 2010"
                        min="1800"
                        max="2026"
                        required
                    >

                </div>


                <div class="button-group">

                    <button
                        type="submit"
                    >
                        Predict House Price
                    </button>


                    <button
                        type="reset"
                        class="reset-button"
                    >
                        Reset
                    </button>

                </div>


            </form>


            {% if prediction %}

                <div class="result">

                    <h2>
                        Predicted House Price
                    </h2>

                    <p>
                        ₹ {{ "{:,.2f}".format(prediction) }}
                    </p>

                </div>

            {% endif %}


            {% if error %}

                <div class="error">

                    <p>
                        Error: {{ error }}
                    </p>

                </div>

            {% endif %}


        </div>


    </div>


</body>

</html>
